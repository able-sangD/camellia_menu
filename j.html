<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Camellia 日本語</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial,"Noto Sans JP",sans-serif;
  background:url("bg.png") center/cover no-repeat;
  padding:20px;
}

.card{
  width:100%;
  max-width:420px;
  background:rgba(255,255,255,.88);
  border-radius:28px;
  padding:38px 28px;
  text-align:center;
  box-shadow:0 18px 40px rgba(0,0,0,.16);
}

.logo{
  font-size:42px;
  margin-bottom:12px;
}

.title{
  font-size:34px;
  font-weight:900;
  margin-bottom:18px;
  color:#221c17;
}

.msg{
  font-size:24px;
  font-weight:800;
  line-height:1.6;
  color:#a92f2d;
  margin-bottom:14px;
}

.sub{
  font-size:15px;
  color:#555;
  line-height:1.6;
}

.btn{
  margin-top:28px;
  display:inline-block;
  text-decoration:none;
  background:#a92f2d;
  color:#fff;
  padding:14px 22px;
  border-radius:999px;
  font-weight:800;
}
</style>
</head>

<body>

<div class="card">
  <div class="logo">🌺</div>
  <div class="title">CAMELLIA</div>

  <div class="msg">
    すみません。<br>
    準備中です。
  </div>

  <div class="sub">
    Japanese menu is being prepared.
  </div>

  <a href="index.html" class="btn">← HOME</a>
</div>

</body>
</html>
